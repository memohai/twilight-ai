name: Release

permissions:
  id-token: write
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      from:
        description: 'Previous tag (e.g. v0.3.3). Leave empty for auto-detect.'
        required: false
        type: string
      to:
        description: 'Current tag to release (e.g. v0.4.0). Leave empty for auto-detect.'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org/

      - name: Run changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
          INPUT_FROM: ${{ inputs.from }}
          INPUT_TO: ${{ inputs.to }}
        run: |
          args=()
          if [ -n "$INPUT_FROM" ]; then args+=(--from "$INPUT_FROM"); fi
          if [ -n "$INPUT_TO" ]; then args+=(--to "$INPUT_TO"); fi
          pnpm dlx changelogithub "${args[@]}"